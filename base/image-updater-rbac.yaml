# Grants argocd-image-updater-controller permission to read the
# sweep-mcp-harbor-pull imagePullSecret in this namespace, so it
# can authenticate to Harbor when scanning for new image tags.
#
# Lives in this CD repo (the namespace's repo) per
# [[feedback_rbac_ownership]] — controller-into-namespace-X access
# belongs in X's repo, not the controller's install.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater-secret-reader
  namespace: sweep-mcp
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - sweep-mcp-harbor-pull
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater-secret-reader
  namespace: sweep-mcp
subjects:
- kind: ServiceAccount
  name: argocd-image-updater-controller
  namespace: argocd
roleRef:
  kind: Role
  name: argocd-image-updater-secret-reader
  apiGroup: rbac.authorization.k8s.io
